name: PR validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write  # needed to post PR comments

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install langdetect

      - name: Detect changed dataset folders
        id: detect
        run: |
          # Get all changed files
          CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null || true)

          # Extract top-level folder names, exclude non-dataset items
          FOLDERS=""
          if [ -n "$CHANGED" ]; then
            FOLDERS=$(echo "$CHANGED" \
              | cut -d/ -f1 \
              | sort -u \
              | grep -vxE 'scripts|\.github|\.git|CODEBOOK\.csv|README\.md|LICENSE|TEST\.md' \
              | tr '\n' ' ' \
              | xargs)
          fi

          echo "Detected folders: '${FOLDERS}'"

          if [ -z "$FOLDERS" ]; then
            echo "has_folders=false" >> "$GITHUB_OUTPUT"
            echo "folders=" >> "$GITHUB_OUTPUT"
          else
            echo "has_folders=true" >> "$GITHUB_OUTPUT"
            echo "folders=$FOLDERS" >> "$GITHUB_OUTPUT"
          fi

      - name: Run validation
        id: validate
        if: steps.detect.outputs.has_folders == 'true'
        run: |
          python scripts/validate_submission.py ${{ steps.detect.outputs.folders }} || true
          # The script writes validation_summary.md in the repo root when
          # GITHUB_ACTIONS=true. We check its exit code via the summary content.

      - name: Post PR comment
        if: steps.detect.outputs.has_folders == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          SUMMARY_FILE="validation_summary.md"
          MARKER="<!-- validation-bot -->"

          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "No summary file found — skipping comment."
            exit 0
          fi

          # Build comment body with hidden marker for upsert
          BODY=$(printf '%s\n%s' "$MARKER" "$(cat $SUMMARY_FILE)")

          # Find existing bot comment
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)

          if [ -n "$EXISTING" ]; then
            # Update existing comment
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING}" \
              -X PATCH -f body="$BODY"
            echo "Updated existing comment $EXISTING"
          else
            # Create new comment
            gh pr comment "$PR_NUMBER" --body "$BODY"
            echo "Created new comment on PR #$PR_NUMBER"
          fi

      - name: Check validation result
        if: steps.detect.outputs.has_folders == 'true'
        run: |
          # Re-run to get the actual exit code
          python scripts/validate_submission.py ${{ steps.detect.outputs.folders }}

      - name: Skip validation (no dataset changes)
        if: steps.detect.outputs.has_folders != 'true'
        run: echo "No dataset folders changed — skipping validation."